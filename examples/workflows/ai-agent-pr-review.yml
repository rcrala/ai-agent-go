name: AI Agent - PR Review

# Ejecuta análisis AI en cada Pull Request y comenta resultados
# Ideal para: Feedback automático en PRs sin bloquear merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev, develop]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download AI Agent binary
        run: |
          wget https://github.com/rcrala/ai-agent-go/releases/latest/download/ai-agent-linux
          chmod +x ai-agent-linux
          echo "✅ AI Agent binary downloaded"
      
      - name: Validate configuration
        run: |
          if [ ! -f "config/config_AIAgent.json" ]; then
            echo "❌ config/config_AIAgent.json not found"
            exit 1
          fi
          echo "✅ Configuration file found"
      
      - name: Run AI Agent Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.base_ref }}
          TARGET_DIR: ./
        run: |
          echo "🤖 Starting AI Agent review..."
          ./ai-agent-linux
          echo "✅ AI Agent review completed"
      
      - name: Extract scores from report
        id: scores
        run: |
          if [ ! -f "ARQUITECTURE_COMPLIANCE.md" ]; then
            echo "average=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract all scores
          scores=$(grep -oP 'Score:\*\*\s*\K\d+' ARQUITECTURE_COMPLIANCE.md || echo "0")
          
          # Calculate average
          if [ -z "$scores" ]; then
            avg=0
          else
            avg=$(echo "$scores" | awk '{s+=$1; c++} END {if(c>0) print int(s/c); else print 0}')
          fi
          
          echo "average=$avg" >> $GITHUB_OUTPUT
          echo "all_scores=$scores" >> $GITHUB_OUTPUT
          echo "📊 Average score: $avg"
      
      - name: Comment on PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read report
            let report = '';
            try {
              report = fs.readFileSync('ARQUITECTURE_COMPLIANCE.md', 'utf8');
            } catch (err) {
              report = '❌ Report generation failed';
            }
            
            const avgScore = parseInt('${{ steps.scores.outputs.average }}') || 0;
            
            // Determine emoji and status
            let emoji = '✅';
            let status = 'Excellent';
            let color = '🟢';
            
            if (avgScore === 0) {
              emoji = '❌';
              status = 'Failed to generate';
              color = '🔴';
            } else if (avgScore < 60) {
              emoji = '🔴';
              status = 'Needs significant improvement';
              color = '🔴';
            } else if (avgScore < 70) {
              emoji = '🟠';
              status = 'Below standard';
              color = '🟠';
            } else if (avgScore < 80) {
              emoji = '⚠️';
              status = 'Acceptable';
              color = '🟡';
            } else if (avgScore < 90) {
              emoji = '🟢';
              status = 'Good';
              color = '🟢';
            }
            
            // Extract metrics
            const metricsMatch = report.match(/\[Metrics\].*?\n/);
            const metrics = metricsMatch ? metricsMatch[0] : 'Metrics not available';
            
            // Create comment body
            const comment = `## ${emoji} AI Agent Review - Score: ${avgScore}/100
            
            **Status:** ${color} ${status}
            
            ### 📊 Quick Metrics
            \`\`\`
            ${metrics}
            \`\`\`
            
            ### 📝 Summary
            ${avgScore < 70 ? '⚠️ **Action Required:** This PR has architectural compliance issues that should be addressed before merging.' : '✅ This PR meets minimum architectural standards.'}
            
            <details>
            <summary>📋 Full Compliance Report (click to expand)</summary>
            
            \`\`\`markdown
            ${report.length > 60000 ? report.substring(0, 60000) + '\n\n... (truncated)' : report}
            \`\`\`
            
            </details>
            
            ---
            
            <sub>🤖 Generated by [AI Agent](https://github.com/rcrala/ai-agent-go) | Run #${{ github.run_number }}</sub>
            `;
            
            // Post comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
            console.log('✅ Comment posted to PR');
      
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-compliance-report-pr-${{ github.event.pull_request.number }}
          path: ARQUITECTURE_COMPLIANCE.md
          retention-days: 30
      
      - name: Summary
        if: always()
        run: |
          echo "### 🤖 AI Agent Review Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Average Score:** ${{ steps.scores.outputs.average }}/100" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 [View Full Report in Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
